<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cronograma · Real Máquinas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>

:root{
  --bg:#0f0f10;--surface:#18181b;--surface2:#1f1f23;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f0efe8;--text-muted:#6b6a72;--text-dim:#9998a3;
  --name-w:130px;--day-w:38px;--bar-h:28px;--bar-gap:6px;--row-pad:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;padding:2rem;padding-bottom:260px}

/* HEADER */
header{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:2.5rem}
.header-title h1{font-size:2rem;font-weight:800;letter-spacing:-.03em;line-height:1}
.header-title p{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);margin-top:6px;letter-spacing:.08em;text-transform:uppercase}
.legend{display:flex;flex-wrap:wrap;gap:8px}
.leg-pill{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:100px;border:1px solid var(--border);font-size:12px;font-weight:600;background:var(--surface);cursor:pointer;transition:all .2s;user-select:none}
.leg-pill:hover{border-color:rgba(255,255,255,.18)}
.leg-pill.active{border-color:currentColor}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* FORM */
.add-section{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:2rem}
.add-section h2{font-size:13px;font-family:'DM Mono',monospace;color:var(--text-muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:1rem}
.form-grid{display:grid;grid-template-columns:155px 1fr 145px 145px 120px 120px;gap:10px;align-items:end}
@media(max-width:900px){.form-grid{grid-template-columns:repeat(2,1fr)}.form-grid .span2{grid-column:span 2}}
.field label{display:block;font-size:11px;font-family:'DM Mono',monospace;color:var(--text-muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.field select,.field input[type=text],.field input[type=date]{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Syne',sans-serif;font-size:13px;padding:9px 12px;outline:none;transition:border-color .2s;appearance:none;-webkit-appearance:none}
.field select:focus,.field input:focus{border-color:rgba(255,255,255,.25)}
.field select option{background:#1f1f23}
.btn-add,.btn-backlog{width:100%;padding:10px;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.02em;transition:opacity .2s,transform .1s}
.btn-add{background:var(--text);color:var(--bg)}
.btn-backlog{background:var(--surface2);color:var(--text-dim);border:1px solid var(--border)}
.btn-add:hover,.btn-backlog:hover{opacity:.85}
.btn-add:active,.btn-backlog:active{transform:scale(.98)}

/* GANTT */
.gantt-wrap{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.gantt-controls{display:flex;align-items:center;gap:8px;padding:.85rem 1.25rem;border-bottom:1px solid var(--border);flex-wrap:wrap}
.ctrl-label{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-right:auto}
.nav-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:border-color .2s}
.nav-btn:hover{border-color:rgba(255,255,255,.2)}
.nav-today{font-size:10px;font-family:'DM Mono',monospace;letter-spacing:.05em;width:auto;padding:0 10px}
.view-sel{font-size:11px;padding:5px 8px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);font-family:'DM Mono',monospace;cursor:pointer;outline:none}
.gantt-scroll{overflow-x:auto}
.gantt-inner{display:flex;flex-direction:column;min-width:max-content}

/* RULER */
.ruler-row{display:flex;border-bottom:1px solid var(--border2);position:sticky;top:0;z-index:10;background:var(--surface)}
.ruler-spacer{width:var(--name-w);flex-shrink:0;border-right:1px solid var(--border2);background:var(--surface)}
.ruler-days{display:flex}
.ruler-day{width:var(--day-w);flex-shrink:0;text-align:center;padding:5px 0;font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;gap:1px;user-select:none}
.ruler-day.is-weekend{background:rgba(255,255,255,.012)}
.ruler-day.is-today{background:rgba(255,255,255,.05)}
.ruler-day-num{font-size:12px;font-weight:500;line-height:1}
.ruler-day.is-today .ruler-day-num{background:var(--text);color:var(--bg);border-radius:50%;width:19px;height:19px;display:flex;align-items:center;justify-content:center}
.ruler-day-sub{font-size:8px;text-transform:uppercase;letter-spacing:.04em;opacity:.7}

/* PERSON ROW */
.person-row{display:flex;border-bottom:1px solid var(--border);transition:background .15s}
.person-row:last-child{border-bottom:none}
.person-row.drag-over{background:rgba(255,255,255,.03)}
.person-label{width:var(--name-w);flex-shrink:0;border-right:1px solid var(--border2);display:flex;align-items:flex-start;gap:8px;padding:var(--row-pad) 12px;position:sticky;left:0;background:var(--surface);z-index:5}
.person-row.drag-over .person-label{background:rgba(255,255,255,.02)}
.person-dot-b{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:2px}
.person-nm{font-size:12px;font-weight:700;letter-spacing:.02em;white-space:nowrap}
.tasks-area{flex:1;position:relative}
.day-bg{position:absolute;top:0;bottom:0;width:var(--day-w);border-right:1px solid var(--border);pointer-events:none}
.day-bg.is-weekend{background:rgba(255,255,255,.014)}
.day-bg.is-today{background:rgba(255,255,255,.038)}
.today-line{position:absolute;top:0;bottom:0;width:2px;background:rgba(255,255,255,.2);z-index:3;pointer-events:none}

/* TASK BAR */
.t-bar{position:absolute;height:var(--bar-h);border-radius:5px;display:flex;align-items:center;padding:0 8px;font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;z-index:2;transition:filter .15s,box-shadow .15s;cursor:grab}
.t-bar:hover{filter:brightness(1.18)}
.t-bar.dragging{opacity:.45;cursor:grabbing}
.t-bar-lbl{overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.t-actions{display:none;align-items:center;gap:3px;margin-left:4px;flex-shrink:0}
.t-bar:hover .t-actions{display:flex}
.t-btn{font-size:10px;opacity:.7;cursor:pointer;padding:1px 3px;border-radius:3px;line-height:1;background:rgba(0,0,0,.2);border:none;color:inherit}
.t-btn:hover{opacity:1;background:rgba(0,0,0,.4)}
.row-empty{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);opacity:.35;pointer-events:none;user-select:none}

/* DROP GHOST */
.drop-ghost{position:absolute;height:var(--bar-h);border-radius:5px;z-index:1;pointer-events:none;border:2px dashed rgba(255,255,255,.3);background:rgba(255,255,255,.05);display:none}

/* BACKLOG PANEL */
.backlog-panel{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border2);z-index:50;transition:height .3s ease}
.backlog-panel.collapsed{height:44px}
.backlog-panel.expanded{height:200px}
.backlog-header{display:flex;align-items:center;gap:10px;padding:0 2rem;height:44px;cursor:pointer;user-select:none;border-bottom:1px solid var(--border)}
.backlog-panel.collapsed .backlog-header{border-bottom:none}
.backlog-title{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.1em;flex:1}
.backlog-count{font-family:'DM Mono',monospace;font-size:11px;background:var(--surface2);color:var(--text-muted);padding:2px 8px;border-radius:10px}
.backlog-toggle{font-size:16px;color:var(--text-muted);transition:transform .3s}
.backlog-panel.expanded .backlog-toggle{transform:rotate(180deg)}
.backlog-body{padding:12px 2rem;overflow-x:auto;overflow-y:hidden;height:calc(200px - 44px);display:flex;align-items:center;gap:10px;transition:background .2s,border-color .2s}
.backlog-body.drag-over{background:rgba(255,255,255,.04)}
.backlog-panel.drag-over-panel .backlog-header{border-bottom-color:rgba(255,255,255,.2)}
.backlog-card{flex-shrink:0;height:36px;border-radius:8px;display:flex;align-items:center;gap:8px;padding:0 12px;font-size:12px;font-weight:600;cursor:grab;border:1px solid var(--border2);background:var(--surface2);color:var(--text);white-space:nowrap;transition:all .15s;user-select:none}
.backlog-card:hover{border-color:rgba(255,255,255,.22);background:#27272b}
.backlog-card.dragging{opacity:.4;cursor:grabbing}
.backlog-card-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:var(--text-muted)}
.backlog-empty{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);opacity:.4;text-transform:uppercase;letter-spacing:.08em}
.backlog-card-del{font-size:10px;opacity:.5;cursor:pointer;margin-left:4px}
.backlog-card-del:hover{opacity:1}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(2px)}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:1.75rem;width:380px;max-width:95vw}
.modal h3{font-size:16px;font-weight:700;margin-bottom:1.25rem}
.modal-field{margin-bottom:12px}
.modal-field label{display:block;font-size:11px;font-family:'DM Mono',monospace;color:var(--text-muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.modal-field select,.modal-field input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Syne',sans-serif;font-size:13px;padding:9px 12px;outline:none;transition:border-color .2s;appearance:none;-webkit-appearance:none}
.modal-field select:focus,.modal-field input:focus{border-color:rgba(255,255,255,.25)}
.modal-field select option{background:#1f1f23}
.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:8px;margin-top:1.25rem}
.btn-save{flex:1;padding:10px;background:var(--text);color:var(--bg);border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .2s}
.btn-save:hover{opacity:.85}
.btn-cancel{padding:10px 16px;background:transparent;color:var(--text-muted);border:1px solid var(--border);border-radius:8px;font-family:'Syne',sans-serif;font-size:13px;cursor:pointer;transition:all .2s}
.btn-cancel:hover{border-color:rgba(255,255,255,.2);color:var(--text-dim)}
.btn-delete{padding:10px 16px;background:transparent;color:#e87a5a;border:1px solid rgba(232,122,90,.3);border-radius:8px;font-family:'Syne',sans-serif;font-size:13px;cursor:pointer;transition:all .2s}
.btn-delete:hover{background:rgba(232,122,90,.1)}

/* TOAST */
.toast{position:fixed;bottom:220px;right:1.5rem;background:var(--text);color:var(--bg);padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;transform:translateY(20px);opacity:0;transition:all .3s;pointer-events:none;z-index:999}
.toast.show{transform:translateY(0);opacity:1}


/* LOGIN SCREEN */
.login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;flex-direction:column;gap:1.5rem}
.login-card{background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:2.5rem 2rem;width:340px;max-width:95vw;text-align:center}
.login-card h2{font-size:1.5rem;font-weight:800;letter-spacing:-.02em;margin-bottom:.5rem}
.login-card p{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2rem}
.btn-google{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px;background:var(--text);color:var(--bg);border:none;border-radius:10px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .2s}
.btn-google:hover{opacity:.88}
.btn-google svg{width:18px;height:18px;flex-shrink:0}
.login-error{font-family:'DM Mono',monospace;font-size:11px;color:#e87a5a;text-align:center}

/* USER BADGE in header */
.user-badge{display:flex;align-items:center;gap:8px;padding:5px 10px 5px 6px;border-radius:100px;border:1px solid var(--border);background:var(--surface);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;user-select:none}
.user-badge:hover{border-color:rgba(255,255,255,.18)}
.user-avatar{width:24px;height:24px;border-radius:50%;object-fit:cover}
.user-avatar-initials{width:24px;height:24px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--text-dim)}
.user-name{max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-dim)}
.btn-logout{font-size:10px;opacity:.5;margin-left:2px}

/* WHO DID IT badge on bar */
.t-who{font-size:9px;opacity:.6;margin-left:4px;font-family:'DM Mono',monospace;flex-shrink:0}

/* Loading overlay */
.loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:900;flex-direction:column;gap:1rem}
.loading-overlay p{font-family:'DM Mono',monospace;font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.1em}
.spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--text-dim);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

</style>
</head>

<!-- APP (hidden until logged in) -->

<header>

  <div class="header-title">

<script>
/* ── FIREBASE CONFIG ── */
const firebaseConfig = {
  apiKey: "AIzaSyAxMNJqOX33okMVRlr3sd1kqDuFqSB7c7w",
  authDomain: "cronograma-real-maquinas.firebaseapp.com",
  projectId: "cronograma-real-maquinas",
  storageBucket: "cronograma-real-maquinas.firebasestorage.app",
  messagingSenderId: "923054247586",
  appId: "1:923054247586:web:1cb25f3c64bde0530e91fb"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

let currentUser = null;

/* ── AUTH ── */
function signIn(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(e=>{
    document.getElementById('loginError').textContent = e.message;
    document.getElementById('loginError').style.display = 'block';
  });

/* lane packing */
function assignLanes(ptasks){
  const sorted=[...ptasks].sort((a,b)=>a.start.localeCompare(b.start));
  const laneEnds=[];const result=[];
  sorted.forEach(t=>{
    let placed=false;
    for(let i=0;i<laneEnds.length;i++){
      if(t.start>laneEnds[i]){laneEnds[i]=t.end;result.push({...t,lane:i});placed=true;break;}
    }
    if(!placed){laneEnds.push(t.end);result.push({...t,lane:laneEnds.length-1});}
  });
  return{tasks:result,laneCount:Math.max(1,laneEnds.length)};
}

/* DRAG FROM TASK BAR (reassign) */
function startBarDrag(e,id){
  dragData={type:'task',id};
  e.dataTransfer.effectAllowed='move';
  setTimeout(()=>document.querySelector(`[data-tid="${id}"]`)?.classList.add('dragging'),0);

  document.getElementById('backlogDropHint').style.opacity='1';

  if(bp.classList.contains('collapsed')){bp.classList.remove('collapsed');bp.classList.add('expanded');}
}
function endBarDrag(id){
  document.querySelector(`[data-tid="${id}"]`)?.classList.remove('dragging');
  dragData=null;
  document.getElementById('backlogDropHint').style.opacity='0';
  document.getElementById('backlogPanel').classList.remove('drag-over-panel');
  document.getElementById('backlogBody').classList.remove('drag-over');

/* BACKLOG PANEL drop zone */
function initBacklogDropZone(){
  const panel=document.getElementById('backlogPanel');
  const body=document.getElementById('backlogBody');
  const hint=document.getElementById('backlogDropHint');

  panel.addEventListener('dragover',e=>{
    if(!dragData||dragData.type!=='task')return;
    e.preventDefault();e.dataTransfer.dropEffect='move';
    panel.classList.add('drag-over-panel');
    body.classList.add('drag-over');
  });
  panel.addEventListener('dragleave',e=>{
    if(!panel.contains(e.relatedTarget)){
      panel.classList.remove('drag-over-panel');
      body.classList.remove('drag-over');
    }
  });
  panel.addEventListener('drop',e=>{
    e.preventDefault();
    panel.classList.remove('drag-over-panel');
    body.classList.remove('drag-over');
    hint.style.opacity='0';
    if(!dragData||dragData.type!=='task')return;
    const t=tasks.find(x=>x.id===dragData.id);
    if(!t)return;
    backlog.push({id:nextBId++,name:t.name,start:t.start,end:t.end});
    tasks=tasks.filter(x=>x.id!==dragData.id);
    dragData=null;
    render();showToast('Movido para o backlog');
  });
}

/* RENDER */
function render(){
  buildLegend();
  const viewEnd=addD(viewStart,viewDays-1);
  document.getElementById('rangeLabel').textContent=
    viewStart.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})+' – '+
    viewEnd.toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});

  const g=document.getElementById('ganttInner');g.innerHTML='';

  /* ruler */
  const ruler=document.createElement('div');ruler.className='ruler-row';
  const sp=document.createElement('div');sp.className='ruler-spacer';ruler.appendChild(sp);
  const rd=document.createElement('div');rd.className='ruler-days';
  let lastMonth=-1;
  for(let i=0;i<viewDays;i++){
    const d=addD(viewStart,i);const dow=d.getDay();
    const cell=document.createElement('div');
    cell.className='ruler-day'+(dow===0||dow===6?' is-weekend':'')+(diff(today,d)===0?' is-today':'');
    const numEl=document.createElement('div');numEl.className='ruler-day-num';numEl.textContent=d.getDate();
    const subEl=document.createElement('div');subEl.className='ruler-day-sub';
    const isNew=d.getMonth()!==lastMonth;lastMonth=d.getMonth();
    subEl.textContent=isNew?MONTHS_PT[d.getMonth()]:DAYS_PT[dow].toLowerCase();
    cell.appendChild(numEl);cell.appendChild(subEl);rd.appendChild(cell);
  }
  ruler.appendChild(rd);g.appendChild(ruler);

  /* person rows */
  const visibles=activeFilter?[activeFilter]:PEOPLE_ORDER;
  visibles.forEach(pName=>{
    const p=PEOPLE[pName];
    const ptasks=tasks.filter(t=>t.resp===pName);
    const{tasks:laned,laneCount}=assignLanes(ptasks);
    const rowH=ROW_PAD*2+(BAR_H+BAR_GAP)*laneCount-BAR_GAP;

    const row=document.createElement('div');row.className='person-row';
    row.style.minHeight=rowH+'px';
    row.dataset.person=pName;

    /* drag-over handlers */
    row.addEventListener('dragover',e=>{
      if(!dragData)return;
      e.preventDefault();e.dataTransfer.dropEffect='move';
      row.classList.add('drag-over');
      // ghost position
      const ghost=row.querySelector('.drop-ghost');
      if(ghost&&dragData.type==='backlog'){
        const rect=row.querySelector('.tasks-area').getBoundingClientRect();
        const x=e.clientX-rect.left;
        const dayOff=Math.round(x/DAY_W);
        ghost.style.left=(dayOff*DAY_W)+'px';
        ghost.style.width=(7*DAY_W)+'px';
        ghost.style.display='block';
      }
    });
    row.addEventListener('dragleave',e=>{
      if(!row.contains(e.relatedTarget)){
        row.classList.remove('drag-over');
        const ghost=row.querySelector('.drop-ghost');
        if(ghost)ghost.style.display='none';
      }
    });
    row.addEventListener('drop',e=>{
      e.preventDefault();
      row.classList.remove('drag-over');
      const ghost=row.querySelector('.drop-ghost');
      if(ghost)ghost.style.display='none';
      if(!dragData)return;

      if(dragData.type==='backlog'){
        const bItem=backlog.find(b=>b.id===dragData.id);
        if(!bItem)return;
        // compute start from drop x
        const rect=row.querySelector('.tasks-area').getBoundingClientRect();
        const x=e.clientX-rect.left;
        const dayOff=Math.max(0,Math.round(x/DAY_W));
        const newStart=addD(viewStart,dayOff);
        // use saved duration or default 7d
        let dur=7;
        if(bItem.start&&bItem.end){
          const s=pd(bItem.start),en=pd(bItem.end);
          dur=Math.max(1,diff(s,en));
        }
        const newEnd=addD(newStart,dur);
        tasks.push({id:nextId++,resp:pName,name:bItem.name,start:fmt(newStart),end:fmt(newEnd)});
        backlog=backlog.filter(b=>b.id!==dragData.id);
        renderBacklog();
      } else if(dragData.type==='task'){
        const t=tasks.find(x=>x.id===dragData.id);
        if(t)t.resp=pName;
      }
      dragData=null;
      render();showToast('Atividade atribuída a '+pName);
    });

    /* name label */
    const lbl=document.createElement('div');lbl.className='person-label';
    lbl.style.minHeight=rowH+'px';
    lbl.innerHTML=`<div class="person-dot-b" style="background:${p.color}"></div>
      <span class="person-nm" style="color:${p.color}">${pName}</span>`;
    row.appendChild(lbl);

    /* area */
    const area=document.createElement('div');area.className='tasks-area';
    area.style.width=(viewDays*DAY_W)+'px';area.style.minHeight=rowH+'px';

    /* day bg */
    for(let i=0;i<viewDays;i++){
      const d=addD(viewStart,i);const dow=d.getDay();
      const bg=document.createElement('div');
      bg.className='day-bg'+(dow===0||dow===6?' is-weekend':'')+(diff(today,d)===0?' is-today':'');
      bg.style.left=(i*DAY_W)+'px';area.appendChild(bg);
    }
    /* today line */
    const tOff=diff(viewStart,today);
    if(tOff>=0&&tOff<viewDays){
      const tl=document.createElement('div');tl.className='today-line';
      tl.style.left=(tOff*DAY_W+DAY_W/2)+'px';area.appendChild(tl);
    }
    /* drop ghost */
    const ghost=document.createElement('div');ghost.className='drop-ghost';area.appendChild(ghost);

    /* bars */
    if(ptasks.length===0){
      const eh=document.createElement('div');eh.className='row-empty';
      eh.textContent='sem atividades';area.appendChild(eh);
    } else {
      laned.forEach(t=>{
        const ts=pd(t.start),te=pd(t.end);
        const sOff=diff(viewStart,ts),eOff=diff(viewStart,te);
        const cS=Math.max(0,sOff),cE=Math.min(viewDays-1,eOff);
        if(cE<0||cS>=viewDays)return;
        const leftPx=cS*DAY_W;
        const wPx=Math.max(DAY_W*0.4,(cE-cS+1)*DAY_W-3);
        const topPx=ROW_PAD+t.lane*(BAR_H+BAR_GAP);
        const dur=diff(ts,te)+1;
        const ds=ts.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
        const de=te.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});

        const bar=document.createElement('div');bar.className='t-bar';
        bar.dataset.tid=t.id;
        bar.style.cssText=`left:${leftPx}px;width:${wPx}px;top:${topPx}px;background:${p.bg};border:1px solid ${p.border};color:${p.color};`;
        bar.title=`${t.name} · ${ds}→${de} (${dur}d)\nClique para editar · Arraste para mover`;
        bar.draggable=true;
        bar.addEventListener('dragstart',e=>startBarDrag(e,t.id));
        bar.addEventListener('dragend',()=>endBarDrag(t.id));

        const maxChars=Math.floor((wPx-56)/6.5);
        const labelText=wPx>40?(t.name.length>maxChars&&maxChars>2?t.name.slice(0,maxChars-1)+'…':t.name):'';
        bar.innerHTML=`<span class="t-bar-lbl">${labelText}</span>`+
          `<span class="t-actions">`+
          `<button class="t-btn" onclick="event.stopPropagation();openModal(${t.id})" title="Editar">✎</button>`+
          `<button class="t-btn" onclick="event.stopPropagation();deleteTask(${t.id})" title="Excluir">✕</button>`+
          `</span>`;
        bar.addEventListener('click',()=>openModal(t.id));
        area.appendChild(bar);
      });
    }
    row.appendChild(area);g.appendChild(row);
  });
  renderBacklog();
}

    const dur=(b.start&&b.end)?Math.max(1,diff(pd(b.start),pd(b.end))+1):null;
    const durBadge=dur?`<span style="font-family:'DM Mono',monospace;font-size:10px;opacity:.55;margin-left:2px">${dur}d</span>`:'';
    card.innerHTML=`<div class="backlog-card-dot"></div><span>${b.name}</span>${durBadge}`+
      `<span class="backlog-card-del" onclick="event.stopPropagation();deleteBacklog('${b._fid}')">✕</span>`;
    card.addEventListener('dragstart',e=>{
      dragData={type:'backlog',id:b._fid};
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
    });
    card.addEventListener('dragend',()=>{card.classList.remove('dragging');dragData=null;});
    body.appendChild(card);
  });
}

/* ── OVERRIDE render() bars to use _fid & show who added ── */
function render(){
  buildLegend();
  const viewEnd=addD(viewStart,viewDays-1);
  document.getElementById('rangeLabel').textContent=
    viewStart.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})+' – '+
    viewEnd.toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});

  const g=document.getElementById('ganttInner'); if(!g) return;
  g.innerHTML='';

  const ruler=document.createElement('div'); ruler.className='ruler-row';
  const sp=document.createElement('div'); sp.className='ruler-spacer'; ruler.appendChild(sp);
  const rd=document.createElement('div'); rd.className='ruler-days';
  let lastMonth=-1;
  for(let i=0;i<viewDays;i++){
    const d=addD(viewStart,i); const dow=d.getDay();
    const cell=document.createElement('div');
    cell.className='ruler-day'+(dow===0||dow===6?' is-weekend':'')+(diff(today,d)===0?' is-today':'');
    const numEl=document.createElement('div'); numEl.className='ruler-day-num'; numEl.textContent=d.getDate();
    const subEl=document.createElement('div'); subEl.className='ruler-day-sub';
    const isNew=d.getMonth()!==lastMonth; lastMonth=d.getMonth();
    subEl.textContent=isNew?MONTHS_PT[d.getMonth()]:DAYS_PT[dow].toLowerCase();
    cell.appendChild(numEl); cell.appendChild(subEl); rd.appendChild(cell);
  }
  ruler.appendChild(rd); g.appendChild(ruler);

  const visibles=activeFilter?[activeFilter]:PEOPLE_ORDER;
  visibles.forEach(pName=>{
    const p=PEOPLE[pName];
    const ptasks=tasks.filter(t=>t.resp===pName);
    const{tasks:laned,laneCount}=assignLanes(ptasks);
    const rowH=ROW_PAD*2+(BAR_H+BAR_GAP)*laneCount-BAR_GAP;

    const row=document.createElement('div'); row.className='person-row';
    row.style.minHeight=rowH+'px'; row.dataset.person=pName;

    row.addEventListener('dragover',e=>{
      if(!dragData) return;
      e.preventDefault(); e.dataTransfer.dropEffect='move';
      row.classList.add('drag-over');
      const ghost=row.querySelector('.drop-ghost');
      if(ghost&&dragData.type==='backlog'){
        const rect=row.querySelector('.tasks-area').getBoundingClientRect();
        const x=e.clientX-rect.left;
        const dayOff=Math.round(x/DAY_W);
        ghost.style.left=(dayOff*DAY_W)+'px';
        ghost.style.width=(7*DAY_W)+'px';
        ghost.style.display='block';
      }
    });
    row.addEventListener('dragleave',e=>{
      if(!row.contains(e.relatedTarget)){
        row.classList.remove('drag-over');
        const ghost=row.querySelector('.drop-ghost');
        if(ghost) ghost.style.display='none';
      }
    });
    row.addEventListener('drop',e=>{
      e.preventDefault();
      row.classList.remove('drag-over');
      const ghost=row.querySelector('.drop-ghost');
      if(ghost) ghost.style.display='none';
      if(!dragData) return;

      if(dragData.type==='backlog'){
        const bItem=backlog.find(b=>b._fid===dragData.id);
        if(!bItem) return;
        const rect=row.querySelector('.tasks-area').getBoundingClientRect();
        const x=e.clientX-rect.left;
        const dayOff=Math.max(0,Math.round(x/DAY_W));
        const newStart=addD(viewStart,dayOff);
        let dur=7;
        if(bItem.start&&bItem.end){ const s=pd(bItem.start),en=pd(bItem.end); dur=Math.max(1,diff(s,en)); }
        const newEnd=addD(newStart,dur);
        dbAddTask({resp:pName,name:bItem.name,start:fmt(newStart),end:fmt(newEnd)}).then(()=>{
          dbDeleteBacklog(bItem._fid);
        });
      } else if(dragData.type==='task'){
        const t=tasks.find(x=>x._fid===dragData.id);
        if(t) dbUpdateTask(t._fid,{resp:pName,name:t.name,start:t.start,end:t.end});
      }
      dragData=null;
      showToast('Atividade atribuída a '+pName);
    });

    const lbl=document.createElement('div'); lbl.className='person-label';
    lbl.style.minHeight=rowH+'px';
    lbl.innerHTML=`<div class="person-dot-b" style="background:${p.color}"></div>
      <span class="person-nm" style="color:${p.color}">${pName}</span>`;
    row.appendChild(lbl);

    const area=document.createElement('div'); area.className='tasks-area';
    area.style.width=(viewDays*DAY_W)+'px'; area.style.minHeight=rowH+'px';

    for(let i=0;i<viewDays;i++){
      const d=addD(viewStart,i); const dow=d.getDay();
      const bg=document.createElement('div');
      bg.className='day-bg'+(dow===0||dow===6?' is-weekend':'')+(diff(today,d)===0?' is-today':'');
      bg.style.left=(i*DAY_W)+'px'; area.appendChild(bg);
    }
    const tOff=diff(viewStart,today);
    if(tOff>=0&&tOff<viewDays){
      const tl=document.createElement('div'); tl.className='today-line';
      tl.style.left=(tOff*DAY_W+DAY_W/2)+'px'; area.appendChild(tl);
    }
    const ghost=document.createElement('div'); ghost.className='drop-ghost'; area.appendChild(ghost);

    if(ptasks.length===0){
      const eh=document.createElement('div'); eh.className='row-empty';
      eh.textContent='sem atividades'; area.appendChild(eh);
    } else {
      laned.forEach(t=>{
        const ts=pd(t.start), te=pd(t.end);
        const sOff=diff(viewStart,ts), eOff=diff(viewStart,te);
        const cS=Math.max(0,sOff), cE=Math.min(viewDays-1,eOff);
        if(cE<0||cS>=viewDays) return;
        const leftPx=cS*DAY_W;
        const wPx=Math.max(DAY_W*0.4,(cE-cS+1)*DAY_W-3);
        const topPx=ROW_PAD+t.lane*(BAR_H+BAR_GAP);
        const dur=diff(ts,te)+1;
        const ds=ts.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
        const de=te.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
        const who=t.createdBy ? t.createdBy.split(' ')[0] : '';

        const bar=document.createElement('div'); bar.className='t-bar';
        bar.dataset.tid=t._fid;
        bar.style.cssText=`left:${leftPx}px;width:${wPx}px;top:${topPx}px;background:${p.bg};border:1px solid ${p.border};color:${p.color};`;
        bar.title=`${t.name}\n${ds} → ${de} (${dur} dias)${who ? '\nAdicionado por: '+t.createdBy : ''}`;
        bar.draggable=true;
        bar.addEventListener('dragstart',e=>startBarDrag(e,t._fid));
        bar.addEventListener('dragend',()=>endBarDrag(t._fid));

        const maxChars=Math.floor((wPx-56)/6.5);
        const labelText=wPx>40?(t.name.length>maxChars&&maxChars>2?t.name.slice(0,maxChars-1)+'…':t.name):'';
        const whoLabel=wPx>90&&who?`<span class="t-who">${who}</span>`:'';
        bar.innerHTML=`<span class="t-bar-lbl">${labelText}</span>${whoLabel}`+
          `<span class="t-actions">`+
          `<button class="t-btn" onclick="event.stopPropagation();openModal('${t._fid}')" title="Editar">✎</button>`+
          `<button class="t-btn" onclick="event.stopPropagation();deleteTask('${t._fid}')" title="Excluir">✕</button>`+
          `</span>`;
        bar.addEventListener('click',()=>openModal(t._fid));
        area.appendChild(bar);
      });
    }
    row.appendChild(area);
    g.appendChild(row);
  });
  renderBacklog();
}

/* startBarDrag / endBarDrag override to use _fid */
function startBarDrag(e,fid){
  dragData={type:'task',id:fid};
  e.dataTransfer.effectAllowed='move';
  setTimeout(()=>document.querySelector(`[data-tid="${fid}"]`)?.classList.add('dragging'),0);
  document.getElementById('backlogDropHint').style.opacity='1';
  const bp=document.getElementById('backlogPanel');
  if(bp.classList.contains('collapsed')){bp.classList.remove('collapsed');bp.classList.add('expanded');}
}
function endBarDrag(fid){
  document.querySelector(`[data-tid="${fid}"]`)?.classList.remove('dragging');
  dragData=null;
  document.getElementById('backlogDropHint').style.opacity='0';
  document.getElementById('backlogPanel').classList.remove('drag-over-panel');
  document.getElementById('backlogBody').classList.remove('drag-over');
}

/* BACKLOG drop zone — override to use _fid */
function initBacklogDropZone(){
  const panel=document.getElementById('backlogPanel');
  const body=document.getElementById('backlogBody');
  const hint=document.getElementById('backlogDropHint');
  panel.addEventListener('dragover',e=>{
    if(!dragData||dragData.type!=='task') return;
    e.preventDefault(); e.dataTransfer.dropEffect='move';
    panel.classList.add('drag-over-panel');
    body.classList.add('drag-over');
  });
  panel.addEventListener('dragleave',e=>{
    if(!panel.contains(e.relatedTarget)){
      panel.classList.remove('drag-over-panel');
      body.classList.remove('drag-over');
    }
  });
  panel.addEventListener('drop',e=>{
    e.preventDefault();
    panel.classList.remove('drag-over-panel');
    body.classList.remove('drag-over');
    hint.style.opacity='0';
    if(!dragData||dragData.type!=='task') return;
    const t=tasks.find(x=>x._fid===dragData.id);
    if(!t) return;
    dbAddBacklog({name:t.name,start:t.start,end:t.end}).then(()=>{
      dbDeleteTask(t._fid);
    });
    dragData=null;
    showToast('Movido para o backlog');
  });
}

/* defaults */
document.getElementById('fStart').value=fmt(today);
document.getElementById('fEnd').value=fmt(addD(today,7));

</script>
